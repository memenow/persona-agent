# https://docs.astral.sh/ruff/configuration/
target-version = "py311"
line-length = 88

[lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = ["E501", "B008"]  # line length handled by formatter; B008 is the FastAPI Depends idiom

[lint.isort]
known-first-party = ["persona_agent"]

[format]
quote-style = "double"
indent-style = "space"
